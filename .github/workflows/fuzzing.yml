name: ClusterFuzzLite Continuous Fuzzing

on:
  schedule:
    - cron: '0 4 * * *' # Каждую ночь в 04:00 UTC
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [python, rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: ${{ matrix.target }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address
          fuzz-target-path: ${{ matrix.target == 'python' && 'fuzz_targets' || 'telemetry_node/fuzz' }}

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 3600
          mode: 'continuous'
