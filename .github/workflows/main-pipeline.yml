name: PLAYE CTI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit flake8

      - name: Linting (Flake8)
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: SAST Security Scan (Bandit)
        run: bandit -r app/ -ll -ii

      - name: Run Unit Tests
        run: pytest tests/ --maxfail=1 --disable-warnings -v

  build-and-scan-image:
    needs: security-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t playe-cti-core:${{ github.sha }} .

      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'playe-cti-core:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
