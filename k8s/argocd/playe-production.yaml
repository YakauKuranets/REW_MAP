apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playe-cti-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/твоя-организация/playe-studio-pro.git'
    targetRevision: HEAD
    path: k8s/
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dutytracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
